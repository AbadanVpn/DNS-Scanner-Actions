name: DNS Range Scanner

on:
  workflow_dispatch:
    inputs:
      domain:
        description: 'Domain to resolve'
        required: true
        default: 'google.com'
      custom_ips:
        description: 'Custom IPs (comma separated, e.g., 192.168.1.1,8.8.8.8) - if empty, uses range below'
        required: false
        default: ''
      start_ip:
        description: 'Start IP (if custom_ips empty)'
        required: false
        default: '192.168.1.1'
      end_ip:
        description: 'End IP (if custom_ips empty)'
        required: false
        default: '192.168.1.254'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build and Run Scanner
        run: |
          dotnet build
          dotnet run
        env:
          INPUT_DOMAIN: ${{ github.event.inputs.domain }}
          INPUT_CUSTOM_IPS: ${{ github.event.inputs.custom_ips }}
          INPUT_START_IP: ${{ github.event.inputs.start_ip }}
          INPUT_END_IP: ${{ github.event.inputs.end_ip }}
      - name: Upload log
        uses: actions/upload-artifact@v4
        with:
          name: scan-log
          path: scan_output.txt
